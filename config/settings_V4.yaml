# ============================================
# CRYPTO SIGNALS - Configuration V4 "Machine Gun" v2
# Corrige: max_loss $0.12 = 0.1% move = bruit → tous les trades meurent
# Fees RT = $0.132 sur $120 → s'ajoutent APRES max_loss/min_profit
#
# Nouveau calcul (fees-aware):
#   Net win  = $0.55 gross - $0.132 fees = +$0.418
#   Net loss = $0.30 gross + $0.132 fees = -$0.432
#   Break-even WR = 50.8% (atteignable, V3 fait 57%)
#   A 55% WR: +$0.039/trade x 50 trades = +$1.95/jour
# ============================================

# --- Paires surveillees (15 paires actives) ---
pairs:
  - symbol: "XRP/USDT:USDT"
    enabled: true
  - symbol: "DOGE/USDT:USDT"
    enabled: true
  - symbol: "PEPE/USDT:USDT"
    enabled: true
  - symbol: "RUNE/USDT:USDT"
    enabled: true
  - symbol: "SOL/USDT:USDT"
    enabled: true
  - symbol: "KAITO/USDT:USDT"
    enabled: true
  - symbol: "BTC/USDT:USDT"
    enabled: true
  - symbol: "VIRTUAL/USDT:USDT"
    enabled: true
  - symbol: "TRUMP/USDT:USDT"
    enabled: true
  - symbol: "AVAX/USDT:USDT"
    enabled: true
  - symbol: "LINK/USDT:USDT"
    enabled: true
  - symbol: "NEAR/USDT:USDT"
    enabled: true
  - symbol: "SUI/USDT:USDT"
    enabled: true
  - symbol: "ARB/USDT:USDT"
    enabled: true
  - symbol: "WIF/USDT:USDT"
    enabled: true

# --- Scanner ---
scanner:
  interval_seconds: 30
  modes:
    - scalping
  anti_flipflop_seconds: 20

# --- Mode Scalping (micro-profits) ---
scalping:
  timeframes:
    analysis:
      - "1m"
      - "5m"
    filter: "15m"

  entry:
    min_score: 55              # monte de 50 → filtre les signaux faibles (16/18 etaient perdants)
    setups:
      - breakout
      - retest
      - ema_bounce
      - momentum
      - divergence
    confirmation_candles: 1

  min_profit_usd: 0.55         # monte de $0.40 → net $0.418 apres fees
  max_loss_usd: 0.30           # monte de $0.12 → 0.25% move (etait 0.1% = bruit pur)

  stop_loss:
    method: "atr"
    atr_multiplier: 1.5        # remonte de 1.0 → SL plus large que max_loss pour que max_loss cap d'abord
    max_stop_pct: 0.5          # remonte de 0.3 → SL technique ne doit pas couper avant max_loss

  take_profit:
    tp1_rr: 1.5
    tp1_close_pct: 100         # 100% a TP1 — machine gun
    tp2_rr: 2.5
    tp2_close_pct: 0
    tp3_rr: 4.0
    tp3_close_pct: 0

  early_protection:
    breakeven_at_pct: 50       # monte de 40 → un peu plus de patience
    trail_activation_pct: 65
    trail_behind_pct: 30

  max_hold_seconds: 1800       # monte de 900 → 30min (plus de temps pour atteindre $0.55)

  break_even:
    trigger: "tp1"

  trailing_stop:
    activate_after: "tp2"
    trail_distance_atr: 0.8

  cooldown:
    after_loss_seconds: 60     # monte de 30 → un peu plus de pause apres loss
    after_win_seconds: 15
    max_consecutive_losses: 5
    pause_after_max_losses_seconds: 300

  risk:
    max_risk_per_trade_pct: 1.0
    leverage_range: [10, 12]
    margin_mode: "isolated"

# --- Couche A: Tradeability Filter ---
tradeability:
  min_score: 0.35              # monte de 0.30 → filtre un peu plus les marches pourris
  weights:
    volatility: 0.17
    volume: 0.17
    spread: 0.17
    depth: 0.12
    funding: 0.12
    oi_stability: 0.10
    adx_trend: 0.10
    order_flow: 0.05
  thresholds:
    atr_min_ratio: 0.3
    atr_max_ratio: 4.0
    volume_min_ratio: 0.20     # monte de 0.15 → exige un minimum de volume
    spread_max_scalp: 0.08     # baisse de 0.10 → spread plus serre
    spread_max_swing: 0.15
    spread_kill: 0.20          # baisse de 0.25 → kill les spreads larges
    funding_max: 0.1
    funding_kill: 0.3
    oi_drop_max_pct: 5.0

# --- Couche B: Direction Filter ---
direction:
  ema_fast: 20
  ema_slow: 50
  ema_neutral_threshold: 0.08  # monte de 0.05 → filtre mieux les faux croisements
  rsi_period: 14
  rsi_long_threshold: 55       # monte de 52 → plus de conviction pour long (evite longs en downtrend)
  rsi_short_threshold: 45      # baisse de 48 → plus de conviction pour short
  structure_lookback: 20

# --- Couche C: Entry Triggers ---
entry:
  bb_period: 20
  bb_std: 2
  bb_squeeze_threshold: 0.06
  volume_spike_ratio: 1.2      # monte de 1.1 → un peu plus de volume requis
  retest_buffer_pct: 0.15
  rejection_wick_ratio: 0.4
  divergence_lookback: 14
  ema_bounce_proximity_pct: 0.35  # baisse de 0.40 → bounce plus precis

# --- Scoring ---
scoring:
  weights:
    tradeability: 0.30
    direction: 0.25
    setup: 0.25
    sentiment: 0.20
  setup_components:
    pattern_quality: 30
    volume_confirmation: 20
    risk_reward: 25
    confluence: 25
  thresholds:
    strong: 80
    medium: 65
    weak: 50

# --- V4 specifique ---
swing_neutral_allowed: true

# --- Anti-correlation ---
anti_correlation:
  max_same_direction: 6        # baisse de 8 → evite 16 longs dans un downtrend

# --- Profit Giveback Protection ---
profit_protection:
  activation_fee_mult: 999.0   # desactive
  giveback_pct: 60

# --- V4 Features (toutes OFF sauf stale_exit) ---
v4_features:
  regime_detection: false
  mtf_confluence: false
  vwap_confluence: false
  order_flow: false
  adaptive_learning: false
  stale_exit: true
  dynamic_sl: false
  anti_correlation: false

# --- Frais de trading ---
fees:
  taker_pct: 0.06

# --- Position Sizing fixe ---
sizing:
  base_pct: 10
  min_margin: 8
  max_margin: 12

# --- Risk Limits ---
risk_limits:
  max_daily_loss_usd: 8.0
  max_consecutive_losses: 8
  pause_minutes: 10

# --- Dashboard ---
dashboard:
  host: "0.0.0.0"
  port: 8000
