# ============================================
# CRYPTO SIGNALS - Configuration V4 "Machine Gun"
# Micro-profits haute frequence : max volume, min_profit $0.40, max_loss $0.12
# Break-even WR ~48.5% | Target 55%+ WR, ~80 trades/jour
# ============================================

# --- Paires surveillees (15 paires actives) ---
pairs:
  - symbol: "XRP/USDT:USDT"
    enabled: true
  - symbol: "DOGE/USDT:USDT"
    enabled: true
  - symbol: "PEPE/USDT:USDT"
    enabled: true
  - symbol: "RUNE/USDT:USDT"
    enabled: true
  - symbol: "SOL/USDT:USDT"
    enabled: true
  - symbol: "KAITO/USDT:USDT"
    enabled: true
  - symbol: "BTC/USDT:USDT"
    enabled: true
  - symbol: "VIRTUAL/USDT:USDT"
    enabled: true
  - symbol: "TRUMP/USDT:USDT"
    enabled: true
  - symbol: "AVAX/USDT:USDT"
    enabled: true
  - symbol: "LINK/USDT:USDT"
    enabled: true
  - symbol: "NEAR/USDT:USDT"
    enabled: true
  - symbol: "SUI/USDT:USDT"
    enabled: true
  - symbol: "ARB/USDT:USDT"
    enabled: true
  - symbol: "WIF/USDT:USDT"
    enabled: true

# --- Scanner ---
scanner:
  interval_seconds: 30       # 2x plus de scans (etait 60)
  modes:
    - scalping               # scalping SEULEMENT (pas de swing = trop lent)
  anti_flipflop_seconds: 20  # etait 45 hardcoded

# --- Mode Scalping (micro-profits) ---
scalping:
  timeframes:
    analysis:
      - "1m"
      - "5m"
    filter: "15m"

  entry:
    min_score: 50              # etait 65 → beaucoup plus de signaux
    setups:
      - breakout
      - retest
      - ema_bounce
      - momentum
      - divergence
    confirmation_candles: 1

  min_profit_usd: 0.40        # ferme a $0.40 gross profit
  max_loss_usd: 0.12          # etait 0.25 → coupe 2x plus vite

  stop_loss:
    method: "atr"
    atr_multiplier: 1.0        # etait 1.5 → SL plus serre
    max_stop_pct: 0.3          # etait 0.5 → cap SL a 0.3%

  take_profit:
    tp1_rr: 1.5
    tp1_close_pct: 100         # 100% a TP1 — machine gun = prendre et partir
    tp2_rr: 2.5
    tp2_close_pct: 0
    tp3_rr: 4.0
    tp3_close_pct: 0

  early_protection:
    breakeven_at_pct: 40       # etait 65 → breakeven plus tot
    trail_activation_pct: 60
    trail_behind_pct: 30

  max_hold_seconds: 900        # etait 7200 → 15min max

  break_even:
    trigger: "tp1"

  trailing_stop:
    activate_after: "tp2"
    trail_distance_atr: 0.8

  cooldown:
    after_loss_seconds: 30     # etait 300 → reprend vite
    after_win_seconds: 15      # etait 120 → reprend tres vite
    max_consecutive_losses: 5
    pause_after_max_losses_seconds: 300

  risk:
    max_risk_per_trade_pct: 1.0
    leverage_range: [10, 12]
    margin_mode: "isolated"

# --- Couche A: Tradeability Filter (beaucoup plus loose) ---
tradeability:
  min_score: 0.30              # etait 0.60 → accepte plus de marches
  weights:
    volatility: 0.17
    volume: 0.17
    spread: 0.17
    depth: 0.12
    funding: 0.12
    oi_stability: 0.10
    adx_trend: 0.10
    order_flow: 0.05
  thresholds:
    atr_min_ratio: 0.3         # etait 0.5
    atr_max_ratio: 4.0         # etait 3.0
    volume_min_ratio: 0.15     # etait 0.4
    spread_max_scalp: 0.10     # etait 0.05
    spread_max_swing: 0.15
    spread_kill: 0.25          # etait 0.15
    funding_max: 0.1
    funding_kill: 0.3
    oi_drop_max_pct: 5.0

# --- Couche B: Direction Filter (plus permissive) ---
direction:
  ema_fast: 20
  ema_slow: 50
  ema_neutral_threshold: 0.05  # etait 0.10
  rsi_period: 14
  rsi_long_threshold: 52      # etait 55
  rsi_short_threshold: 48     # etait 45
  structure_lookback: 20

# --- Couche C: Entry Triggers (plus d'opportunites) ---
entry:
  bb_period: 20
  bb_std: 2
  bb_squeeze_threshold: 0.06  # etait 0.04
  volume_spike_ratio: 1.1     # etait 1.3
  retest_buffer_pct: 0.15     # etait 0.1
  rejection_wick_ratio: 0.4   # etait 0.5
  divergence_lookback: 14
  ema_bounce_proximity_pct: 0.40  # etait 0.25

# --- Scoring ---
scoring:
  weights:
    tradeability: 0.30
    direction: 0.25
    setup: 0.25
    sentiment: 0.20
  setup_components:
    pattern_quality: 30
    volume_confirmation: 20
    risk_reward: 25
    confluence: 25
  thresholds:
    strong: 80
    medium: 65
    weak: 50

# --- V4 specifique ---
swing_neutral_allowed: true   # pas de swing mais safe default

# --- Anti-correlation ---
anti_correlation:
  max_same_direction: 8       # etait 5

# --- Profit Giveback Protection ---
profit_protection:
  activation_fee_mult: 999.0  # desactive profit_giveback
  giveback_pct: 60

# --- V4 Features (toutes OFF sauf stale_exit) ---
v4_features:
  regime_detection: false
  mtf_confluence: false
  vwap_confluence: false
  order_flow: false
  adaptive_learning: false
  stale_exit: true             # GARDER — ferme positions stagnantes
  dynamic_sl: false
  anti_correlation: false

# --- Frais de trading ---
fees:
  taker_pct: 0.06  # MEXC taker fee 0.06%

# --- Position Sizing fixe ---
sizing:
  base_pct: 10
  min_margin: 8
  max_margin: 12

# --- Risk Limits ---
risk_limits:
  max_daily_loss_usd: 8.0
  max_consecutive_losses: 8
  pause_minutes: 10

# --- Dashboard ---
dashboard:
  host: "0.0.0.0"
  port: 8000
