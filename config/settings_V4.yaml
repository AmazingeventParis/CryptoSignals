# ============================================
# CRYPTO SIGNALS - Configuration V4 "Sniper"
# Moins de trades, haute qualite, R:R favorable
#
# Math:
#   Position: $18 marge x 20x lev = $360 notionnel
#   Fees RT: $360 x 0.06% x 2 = $0.432
#   Target: +0.50% = $1.80 gross -> net = $1.80 - $0.432 = +$1.368
#   Max loss: -0.25% = $0.90 gross -> net = $0.90 + $0.432 = -$1.332
#   Break-even WR: 49.3%
#   A 80% WR: EV = +$0.828/trade x 12 = $9.94/jour ~ 10%
# ============================================

# --- Paires surveillees (8 les plus liquides) ---
pairs:
  - symbol: "BTC/USDT:USDT"
    enabled: true
  - symbol: "SOL/USDT:USDT"
    enabled: true
  - symbol: "XRP/USDT:USDT"
    enabled: true
  - symbol: "DOGE/USDT:USDT"
    enabled: true
  - symbol: "PEPE/USDT:USDT"
    enabled: true
  - symbol: "SUI/USDT:USDT"
    enabled: true
  - symbol: "LINK/USDT:USDT"
    enabled: true
  - symbol: "AVAX/USDT:USDT"
    enabled: true

# --- Scanner ---
scanner:
  interval_seconds: 30
  modes:
    - scalping
  anti_flipflop_seconds: 30

# --- Mode Scalping (Sniper) ---
scalping:
  timeframes:
    analysis:
      - "1m"
      - "5m"
    filter: "15m"

  entry:
    min_score: 65
    setups:
      - breakout
      - retest
      - ema_bounce
      - momentum
      - divergence
    confirmation_candles: 1

  min_profit_usd: 1.80          # 0.50% de $360
  max_loss_usd: 0.90            # 0.25% de $360

  stop_loss:
    method: "atr"
    atr_multiplier: 1.5
    max_stop_pct: 0.5

  take_profit:
    tp1_rr: 1.5
    tp1_close_pct: 100           # 100% a TP1, pas de partial
    tp2_rr: 2.5
    tp2_close_pct: 0
    tp3_rr: 4.0
    tp3_close_pct: 0

  early_protection:
    breakeven_at_pct: 50
    trail_activation_pct: 65
    trail_behind_pct: 30

  max_hold_seconds: 1200         # 20min max

  break_even:
    trigger: "tp1"

  trailing_stop:
    activate_after: "tp2"
    trail_distance_atr: 0.8

  cooldown:
    after_loss_seconds: 90
    after_win_seconds: 30
    max_consecutive_losses: 3
    pause_after_max_losses_seconds: 600

  risk:
    max_risk_per_trade_pct: 1.0
    leverage_range: [20, 20]
    margin_mode: "isolated"

# --- Sniper Gates (NOUVEAU) ---
sniper:
  direction_gate: true
  direction_min_score: 65
  obi_gate: true
  obi_min_threshold: 0.15
  momentum_gate: true
  momentum_min_candles: 3
  time_stop:
    scratch_seconds: 300
    scratch_threshold_usd: 0.30

# --- Couche A: Tradeability Filter ---
tradeability:
  min_score: 0.35
  weights:
    volatility: 0.17
    volume: 0.17
    spread: 0.17
    depth: 0.12
    funding: 0.12
    oi_stability: 0.10
    adx_trend: 0.10
    order_flow: 0.05
  thresholds:
    atr_min_ratio: 0.3
    atr_max_ratio: 4.0
    volume_min_ratio: 0.20
    spread_max_scalp: 0.08
    spread_max_swing: 0.15
    spread_kill: 0.20
    funding_max: 0.1
    funding_kill: 0.3
    oi_drop_max_pct: 5.0

# --- Couche B: Direction Filter (plus stricte) ---
direction:
  ema_fast: 20
  ema_slow: 50
  ema_neutral_threshold: 0.10
  rsi_period: 14
  rsi_long_threshold: 55
  rsi_short_threshold: 45
  structure_lookback: 20

# --- Couche C: Entry Triggers ---
entry:
  bb_period: 20
  bb_std: 2
  bb_squeeze_threshold: 0.06
  volume_spike_ratio: 1.2
  retest_buffer_pct: 0.15
  rejection_wick_ratio: 0.4
  divergence_lookback: 14
  ema_bounce_proximity_pct: 0.35

# --- Scoring ---
scoring:
  weights:
    tradeability: 0.30
    direction: 0.25
    setup: 0.25
    sentiment: 0.20
  setup_components:
    pattern_quality: 30
    volume_confirmation: 20
    risk_reward: 25
    confluence: 25
  thresholds:
    strong: 80
    medium: 65
    weak: 50

# --- V4 specifique ---
swing_neutral_allowed: true

# --- Position Sizing ---
sizing:
  base_margin: 18
  min_margin: 15
  max_margin: 20

# --- Anti-correlation ---
anti_correlation:
  max_same_direction: 2

# --- Profit Giveback Protection ---
profit_protection:
  activation_fee_mult: 999.0
  giveback_pct: 60

# --- V4 Features (toutes OFF sauf stale_exit) ---
v4_features:
  regime_detection: false
  mtf_confluence: false
  vwap_confluence: false
  order_flow: false
  adaptive_learning: false
  stale_exit: true
  dynamic_sl: false
  anti_correlation: false

# --- Frais de trading ---
fees:
  taker_pct: 0.06

# --- Risk Limits ---
risk_limits:
  max_daily_loss_usd: 10.0
  max_consecutive_losses: 3
  pause_minutes: 15

# --- Dashboard ---
dashboard:
  host: "0.0.0.0"
  port: 8000
